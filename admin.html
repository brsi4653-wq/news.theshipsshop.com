<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Private Newsroom | SHIPS News</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="assets/admin.css?v=20260621" />
  </head>
  <body>
    <header class="admin-header">
      <a href="index.html"><img src="images/ships-logo-black.png" alt="SHIPS" /></a>
      <div><span id="account-label">Private newsroom</span><button id="refresh-seo" hidden>Refresh sitemap</button><button id="sign-out" hidden>Sign out</button><a href="index.html">View publication</a></div>
    </header>

    <main>
      <section id="login-panel" class="login-panel">
        <span class="eyebrow">Authorized access only</span>
        <h1>Enter the newsroom.</h1>
        <p>Sign in with the authorized SHIPS Google account.</p>
        <button id="google-login" class="primary">Continue with Google</button>
        <p id="login-message" class="message"></p>
      </section>

      <section id="admin-app" class="admin-grid" hidden>
        <aside class="story-sidebar">
          <div class="sidebar-heading"><div><span class="eyebrow">Stories</span><h2>News desk</h2></div><button id="new-article" class="icon-button" title="New article">+</button></div>
          <div id="article-list" class="article-list"></div>
          <details class="settings-panel">
            <summary>Publication settings</summary>
            <form id="settings-form">
              <label>Publication title<input name="site_title" /></label>
              <label>Tagline<input name="tagline" /></label>
              <label>Description<textarea name="description" rows="4"></textarea></label>
              <label>Shop URL<input name="shop_url" type="url" /></label>
              <label>Signal color<input name="accent_color" type="color" /></label>
              <button class="primary" type="submit">Save settings</button>
            </form>
          </details>
        </aside>

        <section class="editor-panel">
          <div class="editor-heading"><div><span class="eyebrow">Article Editor</span><h1 id="editor-title">New article</h1></div><div class="actions"><button id="duplicate-article" type="button">Duplicate</button><button id="delete-article" class="danger" type="button">Delete</button><button id="save-draft" type="button">Save draft</button><button id="publish-article" class="primary" type="button">Publish</button></div></div>
          <form id="article-form">
            <input name="id" type="hidden" />
            <div class="checks"><label><input name="is_published" type="checkbox" /> Published</label><label><input name="is_featured" type="checkbox" /> Featured lead story</label></div>
            <div class="two-column"><label>Headline<input name="title" required /></label><label>URL name<input name="slug" required /></label></div>
            <div class="two-column"><label>Category<input name="category" list="category-options" /><datalist id="category-options"><option value="News"><option value="Culture"><option value="Clothing"><option value="Design"><option value="Technology"><option value="Opinion"></datalist></label><label>Author<input name="author" /></label></div>
            <label>Summary / deck<textarea name="dek" rows="3"></textarea></label>
            <label>Article body <small>Separate paragraphs with a blank line. Begin a heading with ## and a quote with &gt;.</small><textarea name="body" rows="18"></textarea></label>
            <fieldset><legend>Hero image</legend><div class="two-column"><label>Image URL<input name="hero_image_url" type="url" /></label><label>Image description<input name="hero_image_alt" /></label></div><label>Upload hero image<input id="hero-image-file" type="file" accept="image/jpeg,image/png,image/webp" /></label></fieldset>
            <fieldset><legend>Gallery images</legend><label>Upload images<input id="gallery-image-files" type="file" accept="image/jpeg,image/png,image/webp" multiple /></label><label>Gallery data <small>One line per image: URL | description | caption</small><textarea name="gallery_lines" rows="6"></textarea></label></fieldset>
            <fieldset><legend>Search and sharing</legend><div class="two-column"><label>SEO title<input name="seo_title" /></label><label>SEO description<input name="seo_description" /></label></div></fieldset>
            <p id="editor-message" class="message"></p>
          </form>
        </section>
      </section>
    </main>
    <script type="module" src="assets/admin.js?v=20260621"></script>
  </body>
</html>
